# ~/.config/tmux/tmux.conf

# ============================================
# ESSENTIAL SETTINGS
# ============================================

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Enable mouse support
set -g mouse on

# ============================================
# KEY BINDINGS
# ============================================

# Change prefix to Ctrl+a (more ergonomic)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Better pane splitting (and keep current path)
bind '%' split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================================
# APPEARANCE
# ============================================

# Status bar colors
set -g status-style 'fg=brightblack'

# Status bar content
set -g status-left '#{prefix_highlight} '

# Window status
setw -g window-status-format '#I:#W'
setw -g window-status-current-format '#[fg=brightgreen,bold]#I:#W'

# Pane border colors
set -g pane-border-style 'fg=brightblack'
set -g pane-active-border-style 'fg=brightgreen'

# Message styling
set -g message-style 'bg=brightgreen fg=black bold'

# ============================================
# COPY MODE
# ============================================

# Use vi keys
setw -g mode-keys vi

# Vi-style copy bindings
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"  # macOS

# ============================================
# PLUGINS (via TPM)
# ============================================

# Install TPM first:
# git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# Plugin settings
set -g @prefix_highlight_prefix_prompt '#[bold]#S'
set -g @prefix_highlight_fg 'black'
set -g @prefix_highlight_bg 'brightgreen'
set -g @prefix_highlight_empty_prompt '[#S]'

# Initialize TPM (keep at bottom)
run '~/.config/tmux/plugins/tpm/tpm'
